name: Vérification de données — Appel maintenance préventive

on:
  schedule:
    # Chaque lundi à 06:30 UTC (30 min après le backup mWater, pour éviter un export concurrent)
    - cron: "30 6 * * 1"
  workflow_dispatch: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer la vérification
        env:
          MWATER_USERNAME: ${{ secrets.MWATER_USERNAME }}
          MWATER_PASSWORD: ${{ secrets.MWATER_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SHAREPOINT_DRIVE_ID: ${{ secrets.SHAREPOINT_DRIVE_ID }}
          SHAREPOINT_FOLDER_ITEM_ID: ${{ secrets.SHAREPOINT_FOLDER_ITEM_ID }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
        run: python verify_maintenance_preventive.py
