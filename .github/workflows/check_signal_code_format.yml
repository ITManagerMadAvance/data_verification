name: Vérification ponctuelle — Format Signal code (Maintenance/Réparation)

on:
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Vérifier le format des Signal code
        env:
          MWATER_USERNAME: ${{ secrets.MWATER_USERNAME }}
          MWATER_PASSWORD: ${{ secrets.MWATER_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SHAREPOINT_DRIVE_ID: ${{ secrets.SHAREPOINT_DRIVE_ID }}
          SHAREPOINT_FOLDER_ITEM_ID: ${{ secrets.SHAREPOINT_FOLDER_ITEM_ID }}
        run: python check_signal_code_format.py
